<!DOCTYPE html>

            <!-- Nav + Buttons Center -->
            <div class="col-8 d-flex justify-content-center align-items-center ">
                <ul class="navbar-nav flex-row gap-4 align-items-center">
                    <li class="nav-item"><a class="nav-link" href="#">About us</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" style="text-decoration:underline;">Buy</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" style="text-decoration:underline;">Rent</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Blogs</a></li>

                    <li class="nav-item"><a href="#" class="btn nav-btn"><i class="bi bi-person"></i> Sign In / Sign Up</a></li>

        </div>

<!------------ HERO ------------>
    <section class="hero">

        <div class="row">
        <!-- Left content -->

            <h1>Your Trusted<br>Real Estate Partner</h1>

            <!-- Search Tabs -->
            <ul class="nav search-tabs mb-0 gap-2">
                <li class="nav-item"><a class="nav-link active" href="#">Sell</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Rent</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Property by Area</a></li>

            <div class="search-box">
                <select>

                <option>House</option>
                <option>Flat</option>

                </select>
                <select>
